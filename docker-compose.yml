version: "3.9"
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports: ["5000:5000"]
    env_file: .env
    volumes:
      - ./backend:/app
      - ./ledger.json:/app/ledger.json

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes: ["./frontend:/app"]
    ports: ["5173:5173"]
    command: sh -c "npm install && npm run dev -- --host"